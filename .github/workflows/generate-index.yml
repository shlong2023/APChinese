name: Generate Index

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate index.html
        run: |
          echo "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>AP Chinese</title></head><body>" > index.html
          echo "<h1>AP Chinese</h1><ul>" >> index.html
          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            echo "<li><a href='$f'>$f</a></li>" >> index.html
          done
          echo "</ul></body></html>" >> index.html

      - name: Commit index.html
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update index.html"
          git push